name: Deploy React App to S3 + CloudFront

on:
  push:
    branches:
      - develop

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.11.0

      - name: Create .env.production file
        working-directory: frontend-dashboard
        run: |
          echo "VITE_API_ENDPOINT=https://api.noddy.co.kr" > .env.production
          echo "VITE_SOCKET_ENDPOINT=wss://api.noddy.co.kr" >> .env.production

      - name: Show .env.production contents
        working-directory: frontend-dashboard
        run: cat .env.production

      - name: Install dependencies
        working-directory: frontend-dashboard
        run: npm ci

      - name: Build React app
        working-directory: frontend-dashboard
        run: npm run build

      - name: ✅ Check API endpoint in build output
        working-directory: frontend-dashboard
        run: |
          echo "VITE_API_ENDPOINT=https://api.noddy.co.kr" > .env.production
          echo "VITE_SOCKET_ENDPOINT=wss://api.noddy.co.kr" >> .env.production

      - name: Deploy to S3
        uses: jakejarvis/s3-sync-action@v0.5.1
        with:
          args: --delete --acl bucket-owner-full-control
        env:
          AWS_S3_BUCKET: ${{ secrets.S3_BUCKET_NAME }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          SOURCE_DIR: frontend-dashboard/dist

      - name: Invalidate CloudFront cache
        uses: chetan/invalidate-cloudfront-action@v2
        env:
          DISTRIBUTION: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}
          PATHS: "/*"
          AWS_REGION: ${{ secrets.AWS_REGION }}
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
